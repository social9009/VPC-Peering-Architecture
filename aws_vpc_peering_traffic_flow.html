.vtab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);font-weight:500}
.vinfo{padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-size:12.5px;color:var(--color-text-secondary);line-height:1.6;min-height:46px;margin-top:4px}

@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,0)}40%{transform:translate(5px,0)}60%{transform:translate(-3px,0)}80%{transform:translate(3px,0)}}
.ring-on{animation:ringpulse 1.3s ease-in-out infinite}
.shake-on{animation:shake .35s ease-in-out}

<div class="vtabs">
  <button class="vtab active" onclick="go(0)">① SSH → EC2-A</button>
  <button class="vtab" onclick="go(1)">② EC2-A → EC2-B</button>
  <button class="vtab" onclick="go(2)">③ Ping fails ✕</button>
  <button class="vtab" onclick="go(3)">④ Enable peering</button>
  <button class="vtab" onclick="go(4)">⑤ Ping works ✓</button>
</div>
<div class="vinfo ok" id="vinfo">Step 1 — SSH to EC2-A: Your laptop connects to EC2-A's public IP. Traffic flows: Laptop → Internet → IGW → EC2-A (public subnet 10.100.0.0/24).</div>

<script>
let gn=0, pkts=[];
const svg=()=>document.getElementById('vsvg');

function reset(){
  gn++;
  pkts.forEach(p=>{try{p.remove()}catch(e){}});
  pkts=[];
  ['fail-x','rt-a','rt-b','vp-ring','conn-line'].forEach(id=>{
    const e=document.getElementById(id);
    if(e){e.setAttribute('opacity','0');e.classList.remove('ring-on','shake-on');}
  });
}

function mkPkt(col){
  const s=svg(); if(!s) return null;
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('r','6.5');c.setAttribute('fill',col);c.setAttribute('opacity','0');
  s.appendChild(c); pkts.push(c); return c;
}

function runPath(pkt,pid,dur,myGn,cb){
  const path=document.getElementById(pid); if(!path||!pkt) return;
  const len=path.getTotalLength(), t0=performance.now();
  function tick(){
    if(gn!==myGn) return;
    const el=performance.now()-t0, pr=Math.min(el/dur,1);
    const pt=path.getPointAtLength(pr*len);
    pkt.setAttribute('cx',pt.x); pkt.setAttribute('cy',pt.y);
    const op=pr<0.1?pr/0.1:pr>0.9?(1-pr)/0.1:1;
    pkt.setAttribute('opacity',op.toFixed(3));
    if(pr<1) requestAnimationFrame(tick); else if(cb) cb();
  }
  requestAnimationFrame(tick);
}

function wait(ms,myGn,fn){setTimeout(()=>{if(gn===myGn)fn();},ms);}

function fadeEl(id,to,dur,myGn){
  const el=document.getElementById(id); if(!el) return;
  const from=parseFloat(el.getAttribute('opacity'))||0;
  const t0=performance.now();
  function tick(){
    if(gn!==myGn) return;
    const pr=Math.min((performance.now()-t0)/dur,1);
    el.setAttribute('opacity',(from+(to-from)*pr).toFixed(3));
    if(pr<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function loop0(g){
  const p=mkPkt('#1D9E75'); if(!p) return;
  runPath(p,'p0',1400,g,()=>wait(300,g,()=>{p.remove();wait(150,g,()=>loop0(g));}));
}
function loop1(g){
  const p=mkPkt('#1D9E75'); if(!p) return;
  runPath(p,'p1',900,g,()=>wait(250,g,()=>{p.remove();wait(150,g,()=>loop1(g));}));
}
function loop2(g){
  const p=mkPkt('#E24B4A'); if(!p) return;
  runPath(p,'p2',750,g,()=>{
    if(gn!==g) return;
    const fx=document.getElementById('fail-x');
    if(fx){fx.setAttribute('opacity','1');fx.classList.add('shake-on');}
    wait(650,g,()=>{
      if(fx){fx.setAttribute('opacity','0');fx.classList.remove('shake-on');}
      p.remove(); wait(500,g,()=>loop2(g));
    });
  });
}
function doStep3(g){
  const ring=document.getElementById('vp-ring');
  if(ring){ring.setAttribute('opacity','1');ring.classList.add('ring-on');}
  fadeEl('conn-line',0.7,1000,g);
  wait(300,g,()=>{ fadeEl('rt-a',1,900,g); wait(400,g,()=>fadeEl('rt-b',1,900,g)); });
}
function loop4(g){
  const p=mkPkt('#1D9E75'); if(!p) return;
  runPath(p,'p3',1100,g,()=>wait(180,g,()=>{
    const p2=mkPkt('#1D9E75'); if(!p2){p.remove();return;}
    runPath(p2,'p4',1100,g,()=>wait(250,g,()=>{
      p.remove(); p2.remove(); wait(200,g,()=>loop4(g));
    }));
  }));
}

const steps=[
  {fn:loop0,cls:'ok',msg:'✅ Step 1 — SSH into EC2-A: Your laptop connects to EC2-A\'s public IP via Internet → Internet Gateway → Public Subnet. EC2-A is the only instance with a public IP (bastion host).'},
  {fn:loop1,cls:'ok',msg:'✅ Step 2 — SSH from EC2-A to EC2-B: EC2-A SSHs into EC2-B using its private IP (10.100.11.x). Both are in VPC-A — same VPC routing works automatically. (Tip: copy your SSH key to EC2-A first with ssh-copy-id or -A forwarding.)'},
  {fn:loop2,cls:'err',msg:'❌ Step 3 — Ping EC2-C fails: From EC2-B, run: ping 10.200.11.x — BLOCKED! No route exists from VPC-A private subnet to VPC-B. VPC peering has not been set up and route tables have no cross-VPC entries.'},
  {fn:doStep3,cls:'tip',msg:'🔧 Step 4 — Create VPC Peering + update route tables: In Mumbai → Peering Connections → Create peering (local: VPC-A, peer region: us-east-1, peer VPC: VPC-B). Accept in N.Virginia. Then add routes in both private subnet route tables.'},
  {fn:loop4,cls:'ok',msg:'✅ Step 5 — Ping works! EC2-B ↔ EC2-C now communicate bidirectionally via VPC Peering. Run: ping 10.200.11.x from EC2-B terminal. The packets flow through the peering connection across regions.'},
];

function go(n){
  reset();
  document.querySelectorAll('.vtab').forEach((t,i)=>t.classList.toggle('active',i===n));
  const info=document.getElementById('vinfo');
  info.className='vinfo '+steps[n].cls; info.textContent=steps[n].msg;
  const g=gn; steps[n].fn(g);
}

go(0);
</script>
